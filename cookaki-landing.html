<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Cookaki — Bell Kitchen Since 1956</title>
<meta name="description" content="Authentic Greek home cooking steps from the Acropolis. Dine in, take away, or delivery." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400;500&display=swap" rel="stylesheet" />
<style>

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Lato', sans-serif;
  background: #0E2238;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  overflow-x: hidden;
}

/* ── BACKGROUND TEXTURE ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(184,148,62,0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 90%, rgba(107,142,163,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(14,34,56,0) 0%, #07121E 100%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0L80 40L40 80L0 40Z' fill='none' stroke='rgba(184,148,62,0.04)' stroke-width='0.5'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ── PHONE SHELL (desktop only) ── */
.shell {
  position: relative;
  z-index: 1;
  width: 390px;
  max-width: 100vw;
  background: #0E2540;
  border-radius: 48px;
  padding: 18px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 40px 80px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.08);
}

/* On actual mobile — no shell styling */
@media (max-width: 430px) {
  body { background: #0E2238; padding: 0; }
  .shell {
    width: 100%;
    border-radius: 0;
    padding: 0;
    box-shadow: none;
    background: transparent;
  }
}

/* ── CARD ── */
.card {
  background: #122B4A;
  border-radius: 32px;
  overflow: hidden;
  border: 1px solid rgba(184,148,62,0.15);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
}
@media (max-width: 430px) {
  .card { border-radius: 0; border: none; min-height: 100vh; }
}

/* ── HEADER ── */
.header {
  padding: 28px 24px 20px;
  text-align: center;
  position: relative;
  border-bottom: 1px solid rgba(184,148,62,0.12);
  background: linear-gradient(180deg, rgba(184,148,62,0.06) 0%, transparent 100%);
}
.badge {
  position: absolute;
  top: 22px;
  right: 22px;
  width: 52px;
  height: 52px;
  border: 1.5px solid rgba(184,148,62,0.5);
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
}
.badge-bell { font-size: 16px; line-height: 1; }
.badge-text {
  font-family: 'Cinzel', serif;
  font-size: 5px;
  letter-spacing: 0.5px;
  color: #B8943E;
  text-transform: uppercase;
  line-height: 1.4;
  text-align: center;
}
.header-logo {
  font-family: 'Cinzel', serif;
  font-size: 30px;
  font-weight: 600;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #fff;
  line-height: 1;
  margin-bottom: 4px;
}
.header-sub {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: #B8943E;
  opacity: 0.9;
}
.gold-line {
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #B8943E, transparent);
  margin: 10px auto 0;
}

/* ── MENU GRID ── */
.menu-section {
  padding: 16px 14px 8px;
}
.menu-label {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #B8943E;
  text-align: center;
  margin-bottom: 12px;
  opacity: 0.8;
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* ── CATEGORY TILES ── */
.tile {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s;
  text-decoration: none;
  display: block;
  aspect-ratio: 1 / 0.92;
  border: 1px solid rgba(184,148,62,0.18);
}
.tile:hover, .tile:active {
  transform: scale(0.97);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.tile:active { transform: scale(0.94); }

/* Image mosaic background */
.tile-imgs {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 2px;
}
.tile-imgs img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Dark overlay */
.tile-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    160deg,
    rgba(10,28,50,0.55) 0%,
    rgba(10,28,50,0.35) 40%,
    rgba(10,28,50,0.72) 100%
  );
  pointer-events: none;
}

/* Gold shimmer on hover */
.tile::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(184,148,62,0.12) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 2;
}
.tile:hover::before { opacity: 1; }

/* Tile title */
.tile-title {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  padding: 10px 10px 8px;
  font-family: 'Cinzel', serif;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #fff;
  text-shadow: 0 1px 8px rgba(0,0,0,0.8);
  z-index: 3;
  line-height: 1.35;
  background: linear-gradient(180deg, rgba(10,28,50,0.7) 0%, transparent 100%);
}

/* Corner glow accent */
.tile-corner {
  position: absolute;
  bottom: 8px;
  right: 9px;
  width: 22px;
  height: 22px;
  border-right: 1.5px solid rgba(184,148,62,0.6);
  border-bottom: 1.5px solid rgba(184,148,62,0.6);
  border-radius: 0 0 4px 0;
  z-index: 3;
  transition: opacity 0.3s;
}

/* ── SERVICE ICONS BAR ── */
.services {
  padding: 14px 10px 22px;
  border-top: 1px solid rgba(184,148,62,0.12);
  margin-top: 6px;
}
.services-row {
  display: flex;
  justify-content: space-around;
  align-items: flex-start;
  gap: 4px;
}
.svc {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  color: inherit;
  flex: 1;
  padding: 10px 4px;
  border-radius: 12px;
  transition: background 0.2s;
  cursor: pointer;
  border: none;
  background: none;
}
.svc:hover { background: rgba(184,148,62,0.08); }
.svc:active { background: rgba(184,148,62,0.14); }
.svc-icon {
  width: 44px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.svc-icon svg {
  width: 100%;
  height: 100%;
  stroke: rgba(255,255,255,0.85);
  fill: none;
  stroke-width: 1.6;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.svc-label {
  font-family: 'Cinzel', serif;
  font-size: 8.5px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: #fff;
  text-align: center;
  line-height: 1.4;
}
.svc-sub {
  font-family: 'Lato', sans-serif;
  font-size: 9px;
  font-weight: 300;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.3px;
  text-align: center;
}
.svc-divider {
  width: 1px;
  height: 50px;
  background: rgba(184,148,62,0.15);
  align-self: center;
  flex-shrink: 0;
}

/* ── ANIMATIONS ── */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes scalePop {
  from { opacity: 0; transform: scale(0.92); }
  to   { opacity: 1; transform: scale(1); }
}
.header     { animation: fadeDown 0.5s ease both; }
.menu-label { animation: fadeDown 0.55s 0.15s ease both; }
.tile:nth-child(1) { animation: scalePop 0.5s 0.2s ease both; }
.tile:nth-child(2) { animation: scalePop 0.5s 0.28s ease both; }
.tile:nth-child(3) { animation: scalePop 0.5s 0.36s ease both; }
.tile:nth-child(4) { animation: scalePop 0.5s 0.44s ease both; }
.services   { animation: fadeUp 0.5s 0.5s ease both; }

/* ── RIPPLE ── */
.tile { -webkit-tap-highlight-color: transparent; }

</style>
</head>
<body>

<div class="shell">
  <div class="card">

    <!-- HEADER -->
    <div class="header">
      <div class="badge">
        <div class="badge-bell">🔔</div>
        <div class="badge-text">BELL<br>KITCHEN<br>1956</div>
      </div>
      <div class="header-logo">COOKAKI</div>
      <div class="header-sub">— Bell Kitchen —</div>
      <div class="gold-line"></div>
    </div>

    <!-- MENU CATEGORIES -->
    <div class="menu-section">
      <div class="menu-label">Our Menus</div>
      <div class="grid">

        <!-- GREEK MORNING -->
        <a class="tile" href="index.html#morning" onclick="goTo('morning')">
          <div class="tile-imgs">
            <img src="https://images.unsplash.com/photo-1551248429-40975aa4de74?w=200&q=80" alt="Spanakopita" />
            <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=200&q=80" alt="Greek pastry" />
            <img src="https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=200&q=80" alt="Tiropita" />
            <img src="https://images.unsplash.com/photo-1559620192-032c4bc4674e?w=200&q=80" alt="Greek breakfast" />
          </div>
          <div class="tile-overlay"></div>
          <div class="tile-title">The Greek<br>Morning</div>
          <div class="tile-corner"></div>
        </a>

        <!-- GRANDMA'S KITCHEN -->
        <a class="tile" href="index.html#grandma" onclick="goTo('grandma')">
          <div class="tile-imgs">
            <img src="https://images.unsplash.com/photo-1574484284002-952d92456975?w=200&q=80" alt="Moussaka" />
            <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=200&q=80" alt="Stifado" />
            <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=200&q=80" alt="Pastitsio" />
            <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=200&q=80" alt="Greek dish" />
          </div>
          <div class="tile-overlay"></div>
          <div class="tile-title">Grandma's<br>Kitchen</div>
          <div class="tile-corner"></div>
        </a>

        <!-- SEAFOOD -->
        <a class="tile" href="index.html#seafood" onclick="goTo('seafood')">
          <div class="tile-imgs">
            <img src="https://images.unsplash.com/photo-1534482421-64566f976cfa?w=200&q=80" alt="Octopus" />
            <img src="https://images.unsplash.com/photo-1559847844-5315695dadae?w=200&q=80" alt="Calamari" />
            <img src="https://images.unsplash.com/photo-1565680018434-b513d5e5fd47?w=200&q=80" alt="Grilled fish" />
            <img src="https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=200&q=80" alt="Seafood" />
          </div>
          <div class="tile-overlay"></div>
          <div class="tile-title">The Seafood<br>Menu</div>
          <div class="tile-corner"></div>
        </a>

        <!-- GRILL HOUSE -->
        <a class="tile" href="index.html#grill" onclick="goTo('grill')">
          <div class="tile-imgs">
            <img src="https://images.unsplash.com/photo-1529193591184-b1d58069ecdd?w=200&q=80" alt="Grilled meat" />
            <img src="https://images.unsplash.com/photo-1544025162-d76594e978d3?w=200&q=80" alt="BBQ" />
            <img src="https://images.unsplash.com/photo-1558030006-450675393462?w=200&q=80" alt="Kebabs" />
            <img src="https://images.unsplash.com/photo-1551446591-142875a901a1?w=200&q=80" alt="Meatballs" />
          </div>
          <div class="tile-overlay"></div>
          <div class="tile-title">The Grill<br>House</div>
          <div class="tile-corner"></div>
        </a>

      </div>
    </div>

    <!-- SERVICE BAR -->
    <div class="services">
      <div class="services-row">

        <button class="svc" onclick="goTo('home')">
          <div class="svc-icon">
            <svg viewBox="0 0 46 38">
              <!-- Table -->
              <line x1="8" y1="28" x2="38" y2="28"/>
              <line x1="10" y1="28" x2="8" y2="36"/>
              <line x1="36" y1="28" x2="38" y2="36"/>
              <!-- Chair left -->
              <line x1="3" y1="16" x2="16" y2="16"/>
              <line x1="3" y1="16" x2="3" y2="26"/>
              <line x1="16" y1="16" x2="16" y2="26"/>
              <line x1="1" y1="26" x2="18" y2="26"/>
              <!-- Chair right -->
              <line x1="30" y1="16" x2="43" y2="16"/>
              <line x1="30" y1="16" x2="30" y2="26"/>
              <line x1="43" y1="16" x2="43" y2="26"/>
              <line x1="28" y1="26" x2="45" y2="26"/>
            </svg>
          </div>
          <div class="svc-label">Eat With Us</div>
          <div class="svc-sub">(Dine-In)</div>
        </button>

        <div class="svc-divider"></div>

        <button class="svc" onclick="goTo('checkout')">
          <div class="svc-icon">
            <svg viewBox="0 0 44 44">
              <!-- Bag -->
              <path d="M8 14 L8 38 Q8 40 10 40 L34 40 Q36 40 36 38 L36 14 Z"/>
              <path d="M14 14 Q14 6 22 6 Q30 6 30 14"/>
              <!-- Handle lines -->
              <line x1="14" y1="14" x2="14" y2="19"/>
              <line x1="30" y1="14" x2="30" y2="19"/>
            </svg>
          </div>
          <div class="svc-label">Grab &amp; Go</div>
          <div class="svc-sub">(Take Away)</div>
        </button>

        <div class="svc-divider"></div>

        <button class="svc" onclick="goTo('checkout')">
          <div class="svc-icon">
            <svg viewBox="0 0 52 40">
              <!-- Scooter body -->
              <ellipse cx="13" cy="32" rx="7" ry="7"/>
              <ellipse cx="39" cy="32" rx="7" ry="7"/>
              <path d="M20 32 L32 32"/>
              <!-- Body -->
              <path d="M20 22 Q22 14 30 14 L36 14 Q42 14 44 20 L44 28 L32 28 L28 22 Z"/>
              <line x1="28" y1="22" x2="20" y2="22"/>
              <!-- Seat/rider hint -->
              <path d="M30 14 L28 8 Q26 4 22 4 L18 4"/>
              <!-- Handlebar -->
              <line x1="44" y1="18" x2="48" y2="16"/>
              <line x1="48" y1="14" x2="48" y2="20"/>
            </svg>
          </div>
          <div class="svc-label">Delivery</div>
          <div class="svc-sub">(To Your Door)</div>
        </button>

      </div>
    </div>

  </div><!-- /.card -->
</div><!-- /.shell -->

<script>
  // ── NAVIGATION ──
  // Replace 'index.html' with your actual deployed website URL
  const SITE_URL = 'index.html';

  function goTo(section) {
    // Map sections to your main site pages
    const map = {
      morning:  SITE_URL + '?page=menu#morning',
      grandma:  SITE_URL + '?page=menu#grandma',
      seafood:  SITE_URL + '?page=menu#seafood',
      grill:    SITE_URL + '?page=menu#grill',
      home:     SITE_URL,
      checkout: SITE_URL + '?page=checkout',
    };
    if (map[section]) {
      window.location.href = map[section];
    }
  }

  // Prevent double-navigation from <a> tags + onclick
  document.querySelectorAll('.tile').forEach(tile => {
    tile.addEventListener('click', function(e) {
      e.preventDefault();
    });
  });

  // ── RIPPLE EFFECT ──
  document.querySelectorAll('.tile, .svc').forEach(el => {
    el.addEventListener('pointerdown', function(e) {
      const rect = el.getBoundingClientRect();
      const ripple = document.createElement('span');
      const size = Math.max(rect.width, rect.height) * 1.5;
      ripple.style.cssText = `
        position:absolute;
        width:${size}px;height:${size}px;
        left:${e.clientX-rect.left-size/2}px;
        top:${e.clientY-rect.top-size/2}px;
        background:rgba(184,148,62,0.18);
        border-radius:50%;
        transform:scale(0);
        animation:ripple 0.5s ease-out forwards;
        pointer-events:none;
        z-index:10;
      `;
      if (!document.getElementById('rippleStyle')) {
        const s = document.createElement('style');
        s.id = 'rippleStyle';
        s.textContent = '@keyframes ripple{to{transform:scale(1);opacity:0;}}';
        document.head.appendChild(s);
      }
      el.style.position = 'relative';
      el.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });
  });
</script>

</body>
</html>
